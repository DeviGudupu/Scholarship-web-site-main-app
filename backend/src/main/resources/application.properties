spring.application.name=Scholarship-Backend

# Database Configuration - H2 In-Memory Database (Guaranteed to work everywhere)
spring.datasource.url=jdbc:h2:mem:scholarshipdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port
server.port=${PORT:8080}

# Mail Configuration (Updated to Port 465 for better connectivity)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=gudupudevi09@gmail.com
spring.mail.password=fyarygqwhcfunjfn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Mail Timeouts
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
